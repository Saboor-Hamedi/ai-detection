<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Lab | Forensic Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/editor.css">
    <style>
        .hidden { display: none !important; }
        
        /* THE SEAMLESS LAYOUT SYSTEM */
        html, body { height: 100vh; width: 100vw; overflow: hidden; margin: 0; }
        
        #main-wrapper { 
            height: 100vh; 
            width: calc(100vw - 14rem);
            margin-left: 14rem;
            display: flex; 
            flex-direction: column; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #main-wrapper.sidebar-collapsed-main {
            width: calc(100vw - 55px);
            margin-left: 55px;
        }

        .workspace-root { 
            flex: 1;
            display: flex;
            overflow: hidden;
            width: 100%;
            background-color: #ffffff;
        }

        .editor-layers {
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            line-height: 1.6;
            padding: 1.5rem;
        }

        @media (min-width: 1024px) {
            .editor-layers { padding: 3.5rem; }
        }
        
        #sidebar { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 50; }
        
        @media (max-width: 1023px) {
            #main-wrapper { width: calc(100vw - 55px); margin-left: 55px; }
            #sidebar { width: 55px !important; }
            #sidebar.mobile-open { width: 14rem !important; }
            #main-wrapper.mobile-sidebar-open { width: calc(100vw - 14rem); margin-left: 14rem; }
            
            /* INCREASED TO 300PX AS REQUESTED */
            .results-pane { height: 300px !important; width: 100% !important; max-width: none !important; }
            
            .no-scrollbar::-webkit-scrollbar { display: none; }
            .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        }
    </style>
</head>
<body class="flex">
    {{SIDEBAR}}

    <!-- Main Content Wrapper -->
    <div id="main-wrapper" class="relative">
        <!-- Full-Width Header -->
        <div class="flex-shrink-0 w-full">
            {{HEADER}}
        </div>

        <!-- Parallel Workspace -->
        <div class="workspace-root flex-col-reverse lg:flex-row">
            
            <!-- Left Pane: Editor -->
            <div class="flex-[3] flex flex-col border-r border-slate-100 bg-white h-full overflow-hidden">
                <main id="view-editor" class="flex-1 flex flex-col h-full overflow-hidden">
                    <div class="flex-1 relative editor-wrapper editor-layers">
                        <div id="highlighter-layer"></div>
                        <textarea id="input-text" 
                            class="focus:outline-none resize-none overflow-y-auto"
                            placeholder="Drop research draft here for neural forensic validation..."></textarea>
                    </div>
                    
                    <div class="h-12 border-t border-slate-50 flex items-center justify-between px-6 bg-white flex-shrink-0">
                        <div class="flex items-center space-x-4">
                            <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Forensic Ready</span>
                            <span id="char-count" class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">0 Characters</span>
                        </div>
                        
                        <button onclick="runAnalysis()" id="analyze-btn" 
                            class="px-6 py-2 btn-execute rounded flex items-center space-x-2 shadow-sm">
                            <span id="btn-text">Scan</span>
                            <div id="loader" class="hidden w-2.5 h-2.5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                        </button>
                    </div>
                </main>

                <!-- History View -->
                <main id="view-history" class="flex-1 flex flex-col h-full overflow-hidden hidden bg-slate-50/30">
                    <div class="p-10 lg:p-14 space-y-6 overflow-y-auto h-full">
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest">Forensic Archive</h2>
                            <button onclick="clearHistory()" class="text-[9px] font-bold text-red-400 uppercase">Purge</button>
                        </div>
                        <div id="history-list" class="space-y-3"></div>
                    </div>
                </main>
            </div>

            <!-- Right Pane: Results -->
            <div class="results-pane flex-[1] min-w-[320px] lg:max-w-[380px] h-full overflow-y-auto lg:overflow-y-auto bg-slate-50 border-l lg:border-l border-slate-100 no-scrollbar">
                {{RESULTS}}
            </div>
        </div>
    </div>

    <script src="/static/js/forensic.js"></script>
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const mainWrapper = document.getElementById('main-wrapper');
            const isMobile = window.innerWidth < 1024;
            
            if (isMobile) {
                const isOpen = sidebar.classList.toggle('mobile-open');
                mainWrapper.classList.toggle('mobile-sidebar-open', isOpen);
                // In mobile, we keep it visually collapsed unless mobile-open is active
                sidebar.classList.toggle('collapsed-sidebar', !isOpen);
            } else {
                const isCollapsed = sidebar.classList.toggle('collapsed-sidebar');
                mainWrapper.classList.toggle('sidebar-collapsed-main', isCollapsed);
            }
        }

        // SMART RESIZE HANDLER
        function handleResize() {
            const sidebar = document.getElementById('sidebar');
            const mainWrapper = document.getElementById('main-wrapper');
            const isMobile = window.innerWidth < 1024;

            if (isMobile) {
                // Force mobile state
                mainWrapper.classList.remove('sidebar-collapsed-main');
                sidebar.classList.add('collapsed-sidebar');
                sidebar.classList.remove('mobile-open');
                mainWrapper.classList.remove('mobile-sidebar-open');
            } else {
                // Force desktop state (Expanded by default)
                sidebar.classList.remove('mobile-open');
                sidebar.classList.remove('collapsed-sidebar');
                mainWrapper.classList.remove('sidebar-collapsed-main');
                mainWrapper.classList.remove('mobile-sidebar-open');
            }
        }
        
        window.addEventListener('resize', handleResize);
        
        // Initial setup
        if (window.innerWidth < 1024) {
            document.getElementById('sidebar').classList.add('collapsed-sidebar');
        }
    </script>
</body>
</html>
