<div class="workspace-root flex-col-reverse lg:flex-row w-full h-full overflow-hidden">
    <!-- Editor Panel -->
    <div class="flex-[3] flex flex-col border-r border-slate-100 bg-white h-full overflow-hidden">
        <div class="flex-1 relative overflow-hidden">
            <!-- Laboratory Editor -->
            <main id="view-editor" class="absolute inset-0 flex flex-col">
                <div class="flex-1 relative editor-wrapper overflow-hidden">
                    <div class="editor-content-area">
                        <div id="highlighter-layer"></div>
                        <textarea id="input-text" class="no-scrollbar" placeholder=" "
                            oninput="var a=document.getElementById('placeholder-actions');if(a)a.classList.toggle('hidden', this.value.trim().length > 0)"></textarea>
                        <div id="placeholder-actions">
                            <!-- Placeholder Text -->
                            <p class="text-xs font-normal text-slate-300 mb-5">Paste research fragments or ingest PDF records...</p>
                            <!-- Centered Action Bar -->
                            <div class="flex items-center space-x-3 pointer-events-auto">
                                <!-- Paste Entry -->
                                <button onclick="ForensicEngine.pasteFromClipboard()"
                                    class="flex items-center space-x-2 px-4 py-2 bg-white border border-slate-200 rounded-xl shadow-sm hover:border-slate-900 hover:shadow-md transition-all group">
                                    <div class="w-5 h-5 bg-slate-50 rounded flex items-center justify-center group-hover:bg-slate-900 transition-colors">
                                        <svg class="w-3 h-3 text-slate-400 group-hover:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                                        </svg>
                                    </div>
                                    <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Paste</span>
                                </button>

                                <!-- PDF Entry -->
                                <button onclick="document.getElementById('file-input').click()"
                                    class="flex items-center space-x-2 px-4 py-2 bg-white border border-slate-200 rounded-xl shadow-sm hover:border-slate-900 hover:shadow-md transition-all group">
                                    <div class="w-5 h-5 bg-slate-50 rounded flex items-center justify-center group-hover:bg-slate-900 transition-colors">
                                        <svg class="w-3 h-3 text-slate-400 group-hover:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                                        </svg>
                                    </div>
                                    <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Ingest PDF</span>
                                </button>

                                <input type="file" id="file-input" class="hidden" accept=".pdf">
                            </div>
                        </div>
                    </div>

                    <!-- Scoped Telemetry -->
                    <div id="loading-overlay"
                        class="hidden absolute inset-0 z-[200] flex flex-col items-center justify-center">
                        <div
                            class="w-10 h-10 border-[3px] border-slate-900 border-t-transparent rounded-full animate-spin mb-4">
                        </div>
                        <p class="text-[10px] font-black text-slate-900 uppercase tracking-widest">Neural Analysis in
                            Progress</p>
                    </div>
                </div>
            </main>

            <!-- PDF Visualization Area -->
            <main id="view-pdf" class="absolute inset-0 flex flex-col bg-slate-50 hidden">
                <div id="pdf-container"
                    class="flex-1 overflow-y-auto overflow-x-hidden p-12 lg:p-20 flex flex-col items-center space-y-8 scroll-smooth no-scrollbar">
                    
                    <!-- Empty State: Upload Prompt -->
                    <div id="pdf-empty-state" class="flex flex-col items-center justify-center h-full w-full space-y-6">
                        <div class="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center">
                            <svg class="w-8 h-8 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                            </svg>
                        </div>
                        <div class="text-center space-y-2">
                            <p class="text-xs font-black text-slate-400 uppercase tracking-widest">No PDF Loaded</p>
                            <p class="text-[10px] text-slate-300 font-medium">Upload a PDF to begin visual forensic analysis</p>
                        </div>
                        <button onclick="document.getElementById('file-input').click()"
                            class="px-6 py-2.5 bg-slate-900 text-white rounded-lg text-[9px] font-black uppercase tracking-widest hover:bg-slate-700 transition-all shadow-sm">
                            Ingest PDF
                        </button>
                    </div>
                </div>
            </main>

            <!-- Forensic Archive Area -->
            <main id="view-history" class="absolute inset-0 flex flex-col bg-slate-50/50 hidden">
                <div class="p-10 lg:p-14 space-y-6 overflow-y-auto h-full no-scrollbar">
                    <div class="flex justify-between items-end mb-8">
                        <div>
                            <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-1">Archive
                                History</h2>
                            <div class="flex items-baseline space-x-2">
                                <span class="text-xl lg:text-2xl font-normal text-slate-400">Documents</span>
                                <h4 id="history-archive-count"
                                    class="text-3xl lg:text-4xl font-black text-slate-900 tabular-nums">
                                    {{ARCHIVE_COUNT}}</h4>
                            </div>
                        </div>
                        <button onclick="ForensicEngine.clearHistory()"
                            class="px-4 py-1.5 bg-red-50 text-red-500 rounded text-[9px] font-black uppercase tracking-widest hover:bg-red-100 transition-all mb-1">Purge
                            Archive</button>
                    </div>
                    <div id="history-list" class="space-y-3"></div>
                </div>
            </main>
        </div>

        <!-- PERSISTENT FOOTER (Unified Telemetry) -->
        <div
            class="h-auto md:h-14 border-t border-slate-100 flex flex-col md:flex-row items-end md:items-center justify-between px-4 py-3 md:py-0 bg-white flex-shrink-0 z-50 space-y-4 md:space-y-0">
            <div class="flex items-center justify-between w-full md:w-auto space-x-4">
                <div class="flex items-center space-x-3">
                    <button onclick="switchView('editor')"
                        class="text-[10px] font-black text-slate-900 uppercase tracking-widest border-b-2 border-slate-900 pb-1"
                        id="tab-editor">Editor</button>
                    <button onclick="switchView('pdf')"
                        class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b-2 border-transparent pb-1 hidden"
                        id="tab-pdf">Visual Audit</button>
                </div>
                <div class="h-4 w-px bg-slate-100"></div>
                <div class="flex items-center space-x-2 md:space-x-3">
                    <span id="char-count"
                        class="text-[9px] font-normal text-slate-400 uppercase tracking-widest whitespace-nowrap tabular-nums">0
                        Char</span>
                    <div class="h-3 w-px bg-slate-100"></div>
                    <span id="word-count"
                        class="text-[9px] font-normal text-slate-400 uppercase tracking-widest whitespace-nowrap tabular-nums">0
                        Word</span>
                </div>
            </div>

            <div
                class="flex items-center space-x-2 w-full md:w-auto justify-end overflow-x-auto no-scrollbar pb-1 md:pb-0">
                <button onclick="cancelAnalysis()" id="cancel-btn"
                    class="hidden px-3 py-1.5 text-[9px] font-black text-red-500 uppercase tracking-widest hover:bg-red-50 rounded-md transition-all whitespace-nowrap">Cancel</button>
                <button onclick="ForensicEngine.clearEditor()" id="clear-btn"
                    class="px-3 py-1.5 text-[9px] font-black text-slate-400 uppercase tracking-widest hover:bg-slate-50 rounded-md transition-all border border-slate-100 whitespace-nowrap">Clear</button>
                <button onclick="ForensicEngine.downloadReport()" id="report-btn"
                    class="hidden px-3 py-1.5 text-[9px] font-black text-slate-400 uppercase tracking-widest hover:bg-slate-50 rounded-md transition-all border border-slate-100 whitespace-nowrap">Report</button>
                <button onclick="runAnalysis()" id="analyze-btn"
                    class="px-4 py-1.5 bg-slate-900 text-white rounded-md flex items-center space-x-2 shadow-sm hover:bg-black transition-all whitespace-nowrap">
                    <span id="btn-text" class="text-[9px] font-normal uppercase tracking-widest">Scan</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Telemetry Panel -->
    <div
        class="results-pane flex-[1] min-w-[320px] lg:max-w-[380px] h-full overflow-y-auto bg-slate-50 border-l border-slate-100 no-scrollbar">
        {{RESULTS}}
    </div>
</div>
