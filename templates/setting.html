<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | Neural Lab Industrial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-hidden">
    <div class="h-screen flex flex-col overflow-hidden">
        <div class="flex flex-1 overflow-hidden">
            {{SIDEBAR}}

            <div class="flex-1 flex flex-col relative min-w-0 bg-white">
                {{HEADER}}

                <div class="flex-1 overflow-y-auto no-scrollbar p-12 lg:p-20">
                    <div class="max-w-2xl mx-auto space-y-12">
                        <div>
                            <h1 class="text-2xl font-black text-slate-900 uppercase tracking-tighter mb-2">Research Settings</h1>
                            <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Laboratory Configuration & Forensic Parameters</p>
                        </div>

                        <!-- Profile Section -->
                        <section class="space-y-6">
                            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] border-b border-slate-100 pb-2">Profile Authority</h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div class="space-y-2">
                                    <label class="text-[9px] font-black text-slate-500 uppercase">Researcher Name</label>
                                    <input type="text" value="John Doe" class="w-full bg-slate-50 border border-slate-100 rounded-lg px-4 py-3 text-xs font-bold focus:outline-none focus:border-slate-300 transition-all">
                                </div>
                                <div class="space-y-2">
                                    <label class="text-[9px] font-black text-slate-500 uppercase">Email Signature</label>
                                    <input type="email" value="john.doe@neural.lab" class="w-full bg-slate-50 border border-slate-100 rounded-lg px-4 py-3 text-xs font-bold focus:outline-none focus:border-slate-300 transition-all" disabled>
                                </div>
                            </div>
                        </section>

                        <!-- Engine Configuration -->
                        <section class="space-y-6">
                            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] border-b border-slate-100 pb-2">Neural Engine Parameters</h3>
                            <div class="space-y-4">
                                <div class="flex items-center justify-between p-4 bg-slate-50 rounded-xl border border-slate-100">
                                    <div>
                                        <p class="text-[10px] font-black text-slate-900 uppercase">High-Intensity Forensic Scans</p>
                                        <p class="text-[8px] font-bold text-slate-400 uppercase">Increases accuracy but adds neural latency</p>
                                    </div>
                                    <div class="w-10 h-5 bg-emerald-500 rounded-full relative cursor-pointer">
                                        <div class="absolute right-1 top-1 w-3 h-3 bg-white rounded-full"></div>
                                    </div>
                                </div>
                                <div class="flex items-center justify-between p-4 bg-slate-50 rounded-xl border border-slate-100">
                                    <div>
                                        <p class="text-[10px] font-black text-slate-900 uppercase">Automatic Document Archiving</p>
                                        <p class="text-[8px] font-bold text-slate-400 uppercase">Persist every scan to the forensic history</p>
                                    </div>
                                    <div class="w-10 h-5 bg-emerald-500 rounded-full relative cursor-pointer">
                                        <div class="absolute right-1 top-1 w-3 h-3 bg-white rounded-full"></div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        <!-- Action Bar -->
                        <div class="pt-8 flex items-center justify-end space-x-4">
                            <button onclick="window.location.href='/'" class="px-6 py-3 text-[10px] font-black text-slate-400 uppercase tracking-widest hover:text-slate-900 transition-all">Cancel</button>
                            <button class="px-10 py-3 bg-slate-900 text-white rounded-lg text-[10px] font-black uppercase tracking-widest hover:bg-black shadow-lg shadow-slate-900/10 transition-all">Save Changes</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Core Scripts -->
    <script src="/static/js/notifications.js?v=1.0.4"></script>
    <script src="/static/js/auth.js?v=1.0.4"></script>
    <script>
        // Simple Navigation for Settings
        window.switchView = (view) => {
            if (view === 'editor' || view === 'history') {
                window.location.href = '/#' + view;
            }
        };
    </script>
</body>
</html>
