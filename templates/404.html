<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Forensic Anomaly Detected</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .glitch-text { text-shadow: 2px 0 #ef4444, -2px 0 #3b82f6; animation: glitch 2s infinite linear alternate-reverse; }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center overflow-hidden">
    <div class="relative text-center px-6">
        <div class="absolute -top-40 left-1/2 -translate-x-1/2 w-96 h-96 bg-red-500/10 rounded-full blur-[120px]"></div>
        
        <h1 class="text-[180px] font-black text-white leading-none tracking-tighter opacity-10 select-none">404</h1>
        
        <div class="relative -mt-32">
            <h2 class="text-4xl font-black text-white uppercase tracking-tight mb-4">Linguistic Dead End</h2>
            <p class="text-slate-400 font-medium max-w-md mx-auto mb-10 leading-relaxed">
                The neural coordinate you requested does not exist in the Laboratory database. The fragment has been purged or never existed.
            </p>
            
            <a href="/" class="inline-flex items-center space-x-3 px-8 py-4 bg-white text-black font-black uppercase text-sm tracking-widest hover:bg-slate-200 transition-all rounded-full group">
                <span>Return to Laboratory</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                </svg>
            </a>
        </div>
        
        <div class="mt-20 pt-10 border-t border-white/5">
            <p class="text-[10px] font-black text-slate-600 uppercase tracking-[0.4em]">Error-Code: NULL_POINTER_EXCEPTION_V3</p>
        </div>
    </div>
</body>
</html>
