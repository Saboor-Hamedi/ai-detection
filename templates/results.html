<div id="results-panel"
    class="w-full flex flex-row lg:flex-col overflow-x-auto lg:overflow-x-visible space-x-0 lg:space-x-0 lg:space-y-4 items-stretch h-full no-scrollbar lg:p-4">

    <!-- Origin Signature (Adaptive) -->
    <div
        class="card rounded-none lg:rounded-2xl p-12 lg:p-5 bg-white border-r lg:border border-slate-100 flex-shrink-0 w-[300px] lg:w-full h-full lg:h-auto flex flex-col justify-center overflow-hidden">
        <p
            class="text-[8px] lg:text-[10px] font-bold text-slate-300 lg:text-slate-400 uppercase tracking-[0.2em] mb-4 lg:mb-3">
            Neural Signature</p>
        <div class="flex items-center space-x-3 lg:space-x-4">
            <div class="text-left flex-shrink-0">
                <p id="human-prob" class="text-xs lg:text-sm font-black text-emerald-600">--</p>
                <p class="text-[7px] lg:text-[8px] font-bold text-slate-400 uppercase">Human</p>
            </div>
            <div class="flex-1 h-2 lg:h-3 flex rounded-full overflow-hidden bg-slate-50 lg:bg-slate-100 shadow-inner">
                <div id="human-bar" class="h-full bg-emerald-500 transition-all duration-1000" style="width: 50%"></div>
                <div id="ai-bar" class="h-full bg-red-500 transition-all duration-1000" style="width: 50%"></div>
            </div>
            <div class="text-right flex-shrink-0">
                <p id="ai-prob" class="text-xs lg:text-sm font-black text-red-500">--</p>
                <p class="text-[7px] lg:text-[8px] font-bold text-slate-400 uppercase">Neural</p>
            </div>
        </div>
    </div>

    <!-- Triple Engine Consensus -->
    <div
        class="card rounded-none lg:rounded-2xl p-12 lg:p-5 bg-white border-r lg:border border-slate-100 flex-shrink-0 w-[240px] lg:w-full h-full lg:h-auto flex flex-col justify-center overflow-hidden">
        <p
            class="text-[8px] lg:text-[10px] font-bold text-slate-300 lg:text-slate-400 uppercase tracking-[0.2em] mb-4 lg:mb-3">
            Consensus</p>
        <div id="consensus-container" class="space-y-2 lg:space-y-1.5">
            <div class="flex items-center justify-between">
                <span class="text-[7px] lg:text-[9px] text-slate-400 lg:text-slate-500 font-bold uppercase">GPT-2
                    Neural</span>
                <span id="engine-a-verdict"
                    class="px-1.5 py-0.5 lg:px-2 rounded text-[7px] lg:text-[8px] font-black uppercase bg-slate-50 lg:bg-slate-100 text-slate-300 lg:text-slate-400">---</span>
            </div>
            <div class="flex items-center justify-between">
                <span class="text-[7px] lg:text-[9px] text-slate-400 lg:text-slate-500 font-bold uppercase">Stat
                    Heuristic</span>
                <span id="engine-b-verdict"
                    class="px-1.5 py-0.5 lg:px-2 rounded text-[7px] lg:text-[8px] font-black uppercase bg-slate-50 lg:bg-slate-100 text-slate-300 lg:text-slate-400">---</span>
            </div>
            <div id="consensus-status"
                class="mt-2 p-1.5 lg:p-2 bg-slate-50 rounded text-center border border-slate-50 lg:border-slate-100">
                <p class="text-[7px] lg:text-[8px] font-black uppercase tracking-widest text-slate-400">Verifying</p>
            </div>
        </div>
    </div>

    <!-- Audit Accuracy -->
    <div
        class="card rounded-none lg:rounded-2xl p-12 lg:p-5 bg-white border-r lg:border border-slate-100 flex-shrink-0 w-[240px] lg:w-full h-full lg:h-auto flex flex-col justify-center overflow-hidden">
        <p
            class="text-[8px] lg:text-[10px] font-bold text-slate-300 lg:text-slate-400 uppercase tracking-[0.2em] mb-4 lg:mb-3">
            Audit Matrix</p>
        <div class="grid grid-cols-2 gap-x-4 gap-y-3 lg:gap-4">
            <div>
                <p class="text-[6px] lg:text-[7px] font-bold text-slate-400 uppercase">F1-Score</p>
                <p id="f1-val" class="text-[10px] lg:text-sm font-black text-indigo-600">--</p>
            </div>
            <div>
                <p class="text-[6px] lg:text-[7px] font-bold text-slate-400 uppercase">Confidence</p>
                <p id="conf-val" class="text-[10px] lg:text-sm font-black text-emerald-600">--</p>
            </div>
            <div>
                <p class="text-[6px] lg:text-[7px] font-bold text-slate-400 uppercase">Precision</p>
                <p id="precision-val" class="text-[8px] lg:text-[10px] font-black text-slate-600">--</p>
            </div>
            <div>
                <p class="text-[6px] lg:text-[7px] font-bold text-slate-400 uppercase">Recall</p>
                <p id="recall-val" class="text-[8px] lg:text-[10px] font-black text-slate-600">--</p>
            </div>
        </div>
    </div>

    <!-- DNA Radar (Adaptive) -->
    <div
        class="card rounded-none lg:rounded-2xl p-10 lg:p-6 bg-white border-r lg:border border-slate-100 flex-shrink-0 w-[200px] lg:w-full h-full lg:h-auto flex flex-col items-center justify-center overflow-hidden">
        <p
            class="text-[8px] lg:text-[10px] font-bold text-slate-300 lg:text-slate-400 uppercase tracking-[0.2em] mb-3 lg:mb-4">
            Biometrics</p>
        <div class="relative w-full aspect-square max-w-[60px] lg:max-w-[120px]">
            <svg id="forensic-radar" viewBox="0 0 100 100" class="w-full h-full lg:p-1">
                <circle cx="50" cy="50" r="40" fill="none" stroke="#f8fafc" stroke-width="0.5" />
                <circle cx="50" cy="50" r="25" fill="none" stroke="#f8fafc" stroke-width="0.5" stroke-dasharray="2,2" />
                <line x1="50" y1="10" x2="50" y2="90" stroke="#f8fafc" stroke-width="0.5" />
                <line x1="10" y1="50" x2="90" y2="50" stroke="#f8fafc" stroke-width="0.5" />
                <polygon id="radar-poly" points="50,50 50,50 50,50 50,50 50,50" fill="rgba(30, 41, 59, 0.05)"
                    stroke="#cbd5e1" stroke-width="1.5" class="transition-all duration-1000" />
            </svg>
            <div
                class="absolute -top-1 lg:-top-2 left-1/2 -translate-x-1/2 text-[7px] lg:text-[8px] font-black uppercase text-slate-400">
                Diversity</div>
            <div
                class="absolute -bottom-1 lg:-bottom-2 left-1/2 -translate-x-1/2 text-[7px] lg:text-[8px] font-black uppercase text-slate-400">
                Complexity</div>
            <div
                class="absolute -right-2 lg:-right-3 top-1/2 -translate-y-1/2 text-[7px] lg:text-[8px] font-black uppercase text-slate-400 rotate-90 origin-center translate-x-1">
                Stability</div>
            <div
                class="absolute -left-2 lg:-left-3 top-1/2 -translate-y-1/2 text-[7px] lg:text-[8px] font-black uppercase text-slate-400 -rotate-90 origin-center -translate-x-1">
                Rhythm</div>
        </div>
    </div>

    <!-- Verdict -->
    <div id="summary-card"
        class="card rounded-none lg:rounded-2xl p-12 lg:p-5 bg-white flex-shrink-0 w-[240px] lg:w-full h-full lg:h-auto flex flex-col justify-center overflow-hidden">
        <p class="text-[8px] lg:text-[10px] font-bold text-slate-300 lg:text-slate-400 uppercase tracking-[0.2em] mb-2">
            Final Verdict</p>
        <h3 id="classification" class="text-[10px] lg:text-sm font-black text-slate-900 uppercase italic">Awaiting</h3>
        <p id="verdict-desc" class="text-[7px] lg:text-[9px] text-slate-400 lg:text-slate-500 mt-1 leading-tight">Neural
            weights active.</p>
    </div>
</div>
