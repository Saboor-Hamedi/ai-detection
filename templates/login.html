<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Lab | Authorize Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .spectral-gradient {
            background: radial-gradient(circle at top right, #f1f5f9 0%, #f8fafc 100%);
        }
    </style>
</head>
<body class="spectral-gradient min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-[380px] bg-white rounded-[5px] shadow-[0_30px_80px_rgba(0,0,0,0.1)] overflow-hidden flex flex-col border border-slate-100">
        
        <!-- Header (Minimalist) -->
        <div class="px-8 pt-8 pb-4 text-left border-b border-slate-50 mb-4">
            <h1 id="auth-title" class="text-sm font-black text-slate-900 uppercase tracking-widest">Neural Lab</h1>
            <p id="auth-subtitle" class="text-[8px] font-bold text-slate-400 mt-1 uppercase tracking-[0.2em]">Authorize Forensic Access</p>
        </div>

        <!-- Form Area (Geometric) -->
        <div class="px-8 pb-8 space-y-3.5">
            <div id="register-fields" class="hidden space-y-3.5">
                <div class="space-y-1">
                    <label class="text-[8px] font-black text-slate-400 uppercase tracking-widest ml-0.5">Full Name</label>
                    <input type="text" id="reg-name" placeholder="John Doe" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-100 rounded-[3px] text-[11px] font-bold text-slate-900 focus:outline-none focus:border-slate-900 transition-colors">
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-[8px] font-black text-slate-400 uppercase tracking-widest ml-0.5">Research Email</label>
                <input type="email" id="auth-email" placeholder="name@lab.com" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-100 rounded-[3px] text-[11px] font-bold text-slate-900 focus:outline-none focus:border-slate-900 transition-colors">
            </div>

            <div class="space-y-1">
                <label class="text-[8px] font-black text-slate-400 uppercase tracking-widest ml-0.5">Laboratory Key</label>
                <input type="password" id="auth-password" placeholder="••••••••" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-100 rounded-[3px] text-[11px] font-bold text-slate-900 focus:outline-none focus:border-slate-900 transition-colors">
            </div>

            <div class="flex items-center justify-between px-1">
                <label class="flex items-center space-x-2 cursor-pointer group">
                    <input type="checkbox" id="auth-remember" class="w-3 h-3 border-slate-200 rounded-[2px] accent-slate-900 cursor-pointer">
                    <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest group-hover:text-slate-600 transition-colors">Remember Me</span>
                </label>
            </div>

            <button onclick="submitAuth()" id="auth-submit-btn" class="w-full py-4 bg-slate-900 text-white rounded-[3px] text-[9px] font-black uppercase tracking-[0.3em] shadow-md hover:bg-slate-800 transition-all transform active:scale-[0.98]">
                Authorize Access
            </button>

            <div class="pt-3 text-center border-t border-slate-50">
                <button onclick="toggleAuthMode()" id="auth-mode-toggle" class="text-[8px] font-black text-slate-400 hover:text-slate-900 uppercase tracking-widest transition-colors">
                    New Researcher? <span class="text-slate-900 border-b border-slate-900">Initialize</span>
                </button>
            </div>
        </div>

        <div class="h-10 bg-slate-50 border-t border-slate-100 flex items-center justify-center">
            <p class="text-[8px] font-black text-slate-300 uppercase tracking-[0.4em]">Forensic Protocol v3.0</p>
        </div>
    </div>

    <!-- Notification Engine -->
    <script src="/static/js/notifications.js?v=1.0.4"></script>
    <script>
        let isRegisterMode = false;

        // Restore Remembered Credentials
        window.onload = () => {
            const savedEmail = localStorage.getItem('lab_remembered_email');
            if (savedEmail) {
                document.getElementById('auth-email').value = savedEmail;
                document.getElementById('auth-remember').checked = true;
            }

            // Universal Enter-Key Listener for Industrial Input
            const inputs = ['reg-name', 'auth-email', 'auth-password'];
            inputs.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') submitAuth();
                    });
                }
            });
        };

        function toggleAuthMode() {
            // ... (rest of toggleAuthMode stays same)
            isRegisterMode = !isRegisterMode;
            const subtitle = document.getElementById('auth-subtitle');
            const regFields = document.getElementById('register-fields');
            const toggleBtn = document.getElementById('auth-mode-toggle');
            const submitBtn = document.getElementById('auth-submit-btn');

            if (isRegisterMode) {
                subtitle.textContent = "Initialize Forensic Profile";
                regFields.classList.remove('hidden');
                submitBtn.textContent = "Initialize";
                toggleBtn.innerHTML = 'Registered? <span class="text-slate-900 border-b border-slate-900">Login</span>';
            } else {
                subtitle.textContent = "Authorize Forensic Access";
                regFields.classList.add('hidden');
                submitBtn.textContent = "Authorize Access";
                toggleBtn.innerHTML = 'New Researcher? <span class="text-slate-900 border-b border-slate-900">Initialize</span>';
            }
        }

        async function submitAuth() {
            const errorDiv = document.getElementById('auth-error');
            if (errorDiv) errorDiv.classList.add('hidden');
            
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const name = document.getElementById('reg-name').value;
            const remember = document.getElementById('auth-remember').checked;

            const endpoint = isRegisterMode ? '/api/auth/register' : '/api/auth/login';
            const body = isRegisterMode ? { email, password, full_name: name } : { email, password, remember };

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await response.json();
                
                if (response.ok) {
                    if (remember) {
                        localStorage.setItem('lab_remembered_email', email);
                    } else {
                        localStorage.removeItem('lab_remembered_email');
                    }

                    if (isRegisterMode) {
                        toggleAuthMode();
                        window.success("Profile initialized.");
                    } else {
                        window.location.href = "/";
                    }
                } else {
                    if (errorDiv) {
                        errorDiv.textContent = data.detail || "Access Denied.";
                        errorDiv.classList.remove('hidden');
                    }
                    window.error(data.detail || "Access Denied.");
                }
            } catch (e) {
                window.error("Laboratory link severed.");
            }
        }
    </script>
</body>
</html>
