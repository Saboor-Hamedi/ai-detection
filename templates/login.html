<div class="auth-card">
    <!-- Header (Minimalist) -->
    <div class="auth-header">
        <h1 id="auth-title" class="text-sm font-black text-slate-900 uppercase tracking-widest">Neural Lab</h1>
        <p id="auth-subtitle" class="text-[8px] font-bold text-slate-400 mt-1 uppercase tracking-[0.2em]">Authorize Forensic Access</p>
    </div>

    <!-- Form Area (Geometric) -->
    <form onsubmit="event.preventDefault(); submitAuth();" class="auth-body space-y-3.5">
        <div id="register-fields" class="hidden space-y-3.5">
            <div class="auth-input-group">
                <label class="auth-label">Full Name</label>
                <input type="text" id="reg-name" placeholder="John Doe" class="auth-input">
            </div>
        </div>

        <div class="auth-input-group">
            <label class="auth-label">Research Email</label>
            <input type="email" id="auth-email" placeholder="name@lab.com" class="auth-input" required>
        </div>

        <div class="auth-input-group">
            <label class="auth-label">Laboratory Key</label>
            <input type="password" id="auth-password" placeholder="••••••••" class="auth-input" required>
        </div>

        <div class="flex items-center justify-between px-1 mb-6">
            <label class="flex items-center space-x-2 cursor-pointer group">
                <input type="checkbox" id="auth-remember" class="w-3 h-3 border-slate-200 rounded-[2px] accent-slate-900 cursor-pointer">
                <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest group-hover:text-slate-600 transition-colors">Remember Me</span>
            </label>
        </div>

        <button type="submit" id="auth-submit-btn" class="auth-btn">
            Authorize Access
        </button>

        <div class="pt-6 mt-6 text-center border-t border-slate-50">
            <button type="button" onclick="toggleAuthMode()" id="auth-mode-toggle" class="text-[8px] font-black text-slate-400 hover:text-slate-900 uppercase tracking-widest transition-colors">
                New Researcher? <span class="text-slate-900 border-b border-slate-900">Initialize</span>
            </button>
        </div>
    </form>

    <div class="h-10 bg-slate-50 border-t border-slate-100 flex items-center justify-center">
        <p class="text-[8px] font-black text-slate-300 uppercase tracking-[0.4em]">Forensic Protocol v3.0</p>
    </div>
</div>

<script>
    let isRegisterMode = false;

    window.onload = () => {
        const savedEmail = localStorage.getItem('lab_remembered_email');
        if (savedEmail) {
            document.getElementById('auth-email').value = savedEmail;
            document.getElementById('auth-remember').checked = true;
        }

        const inputs = ['reg-name', 'auth-email', 'auth-password'];
        inputs.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') submitAuth();
                });
            }
        });
    };

    function toggleAuthMode() {
        isRegisterMode = !isRegisterMode;
        const subtitle = document.getElementById('auth-subtitle');
        const regFields = document.getElementById('register-fields');
        const toggleBtn = document.getElementById('auth-mode-toggle');
        const submitBtn = document.getElementById('auth-submit-btn');

        if (isRegisterMode) {
            subtitle.textContent = "Initialize Forensic Profile";
            regFields.classList.remove('hidden');
            submitBtn.textContent = "Initialize";
            toggleBtn.innerHTML = 'Registered? <span class="text-slate-900 border-b border-slate-900">Login</span>';
        } else {
            subtitle.textContent = "Authorize Forensic Access";
            regFields.classList.add('hidden');
            submitBtn.textContent = "Authorize Access";
            toggleBtn.innerHTML = 'New Researcher? <span class="text-slate-900 border-b border-slate-900">Initialize</span>';
        }
    }

    async function submitAuth() {
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-password').value;
        const name = document.getElementById('reg-name').value;
        const remember = document.getElementById('auth-remember').checked;

        const endpoint = isRegisterMode ? '/api/auth/register' : '/api/auth/login';
        const body = isRegisterMode ? { email, password, full_name: name } : { email, password, remember };

        try {
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            const data = await response.json();

            if (response.ok) {
                if (remember) {
                    localStorage.setItem('lab_remembered_email', email);
                } else {
                    localStorage.removeItem('lab_remembered_email');
                }

                if (isRegisterMode) {
                    toggleAuthMode();
                    window.success("Profile initialized.");
                } else {
                    window.location.href = "/";
                }
            } else {
                window.error(data.detail || "Access Denied.");
            }
        } catch (e) {
            window.error("Laboratory link severed.");
        }
    }
</script>
