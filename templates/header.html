<header class="sticky top-0 right-0 left-0 h-12 border-b border-slate-100 bg-white/70 backdrop-blur-md flex items-center justify-between px-6 z-[60]">
    <div class="flex items-center space-x-2">
        <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest">Workspace</span>
        <span class="text-slate-200">/</span>
        <h2 class="text-[10px] font-black text-slate-900 uppercase tracking-tight">Forensic Lab</h2>
    </div>
    <div class="flex items-center space-x-4">
        <div class="flex items-center space-x-1.5 mr-2">
            <div class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></div>
            <span class="text-[9px] font-black text-slate-500 uppercase tracking-tighter">Secure Link</span>
        </div>
        
        <div class="h-4 w-px bg-slate-100"></div>

        <!-- Account Component (Full Round / Small) -->
        <div class="relative">
            <button onclick="toggleAccountMenu()" id="profile-trigger" class="w-7 h-7 rounded-full bg-slate-900 flex items-center justify-center text-white text-[9px] font-black border-2 border-white shadow-sm hover:scale-105 transition-transform">
                JD
            </button>
            
            <!-- Account Dropdown Menu -->
            <div id="account-menu" class="absolute right-0 mt-3 w-44 bg-white border border-slate-100 rounded-xl shadow-[0_20px_50px_rgba(0,0,0,0.1)] py-2 hidden z-[100]">
                <div class="px-4 py-2.5 border-b border-slate-50 mb-1">
                    <p class="text-[10px] font-black text-slate-900 truncate">John Doe</p>
                    <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Lead Researcher</p>
                </div>
                <button onclick="switchView('history')" class="w-full text-left px-4 py-2 text-[9px] font-black text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-colors uppercase tracking-widest">Audit History</button>
                <button onclick="alert('Settings loading...')" class="w-full text-left px-4 py-2 text-[9px] font-black text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-colors uppercase tracking-widest">Settings</button>
                <div class="border-t border-slate-50 mt-1 pt-1">
                    <button onclick="handleLogout()" class="w-full text-left px-4 py-2 text-[9px] font-black text-red-500 hover:bg-red-50 transition-colors uppercase tracking-widest">Logout</button>
                </div>
            </div>
        </div>
    </div>
</header>
