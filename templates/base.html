<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Lab | Industrial Forensic Suite</title>
    
    <!-- Industrial Design Tokens -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;700&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/editor.css?v=1.0.9">
    
    <!-- Forensic Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf_viewer.min.css">
    
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .neural-font { font-family: 'Spectral', serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-white text-slate-900 antialiased overflow-hidden">

    <div class="flex h-screen w-screen overflow-hidden">
        <!-- TIER 1: SIDEBAR -->
        {{SIDEBAR}}

        <div id="main-wrapper" class="flex-1 flex flex-col min-w-0 relative bg-white">
            <!-- TIER 2: HEADER -->
            {{HEADER}}

            <!-- TIER 3: DYNAMIC CONTENT -->
            <main class="flex-1 relative flex overflow-hidden">
                {{CONTENT}}
            </main>
        </div>
    </div>

    <!-- Core Laboratory Scripts -->
    <script src="/static/js/notifications.js?v=1.0.5"></script>
    <script src="/static/js/auth.js?v=1.0.5"></script>
    <script src="/static/js/sidebar.js?v=1.0.5"></script>
    <script src="/static/js/components/PDFVisualizer.js?v=1.0.5"></script>
    <script src="/static/js/components/ConfirmModal.js?v=2.0.0"></script>
    <script src="/static/js/forensic.js?v=2.0.0"></script>
</body>
</html>
